spring:
  application:
    name: word-forge
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/wordforage
    username: postgrest
    password: postgrest
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

wordforge:
  jwt:
    secret: "${JWT_SECRET:dev-only-change-in-production-use-env-var}"
    expiry-days: 30
  groq:
    # Free API key from https://console.groq.com/keys (uses LLaMA 3 — open-source by Meta)
    # Set env var WORDFORGE_GROQ_API_KEY=gsk_... to enable real AI enrichment.
    # Without this key, a built-in fallback generates placeholder sentences.
    api-key: "${WORDFORGE_GROQ_API_KEY:}"

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
