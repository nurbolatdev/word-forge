spring:
  application:
    name: word-forge
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/wordforage
    username: postgrest
    password: postgrest
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

wordforge:
  jwt:
    secret: "${JWT_SECRET:dev-only-change-in-production-use-env-var}"
    expiry-days: 30

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
