services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wordforge
      SPRING_DATASOURCE_USERNAME: wordforge
      SPRING_DATASOURCE_PASSWORD: wordforge
      WORDFORGE_JWT_SECRET: ${JWT_SECRET:-dev-only-change-in-production-use-env-var}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wordforge
      POSTGRES_USER: wordforge
      POSTGRES_PASSWORD: wordforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
