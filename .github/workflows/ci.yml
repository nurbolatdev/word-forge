name: CI

on:
  push:
    branches: [main, "stage-*"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wordforge_test
          POSTGRES_USER: wordforge
          POSTGRES_PASSWORD: wordforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Build & test
        run: ./gradlew :backend:test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/wordforge_test
          SPRING_DATASOURCE_USERNAME: wordforge
          SPRING_DATASOURCE_PASSWORD: wordforge
          WORDFORGE_JWT_SECRET: ci-test-secret-key-must-be-at-least-32-chars!!

  frontend:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Type-check
        run: npx tsc -b
        working-directory: frontend
